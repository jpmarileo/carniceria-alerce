<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Carnicería del Barrio • Cortes Premium</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap">
  
  <!-- Nuestro CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white">

  <!-- HEADER -->
  <header id="header"></header>

  <!-- HERO -->
  <section id="hero"></section>

  <!-- SECCIÓN CORTES -->
  <section id="cortes" class="max-w-7xl mx-auto px-4 py-16">
    <div class="flex items-end justify-between mb-10">
      <div>
        <span class="text-red-600 text-sm font-medium tracking-widest">NUESTROS PRODUCTOS</span>
        <h2 class="text-4xl font-bold titulo-carniceria mt-1">Cortes del Día</h2>
      </div>
    </div>

    <div id="grid-cortes" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- Se llena con JavaScript -->
    </div>
  </section>

  <!-- FOOTER -->
  <footer id="footer"></footer>

  <!-- MODAL CARRITO -->
  <div id="modal-carrito" class="hidden fixed inset-0 bg-black/80 flex items-end md:items-center justify-center z-[100]">
    <!-- Se llena con JavaScript -->
  </div>

  <!-- Scripts (en este orden) -->
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script<div></div>>
</body>
</html>
